name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Docker image tag (e.g. 2.3.0 or v2.3.0)"
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Normalize Version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Verify Image Exists
        run: |
          docker manifest inspect kamit6337/voult-backend:${VERSION}

      - name: Pull Selected Version
        run: |
          docker pull kamit6337/voult-backend:${VERSION}

      - name: Tag as Latest
        run: |
          docker tag \
            kamit6337/voult-backend:${VERSION} \
            kamit6337/voult-backend:latest

      - name: List Docker Images
        run: docker images

      - name: Push Latest
        run: |
          docker push kamit6337/voult-backend:latest

      - name: Summary
        run: |
          echo "✅ Successfully rolled back latest to ${VERSION}"
